version: 2.1

jobs:
  test:
    docker:
      - image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_directory: ~/project
    parallelism: 4
    environment:
      CI: "true"
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run Playwright shard
          command: npx playwright test --shard=$((CIRCLE_NODE_INDEX + 1))/$CIRCLE_NODE_TOTAL
      - run:
          name: Collect blob report
          command: |
            mkdir -p workspace/blob/$CIRCLE_NODE_INDEX
            cp -R blob-report/. workspace/blob/$CIRCLE_NODE_INDEX/
      - persist_to_workspace:
          root: workspace
          paths:
            - blob
      - store_artifacts:
          path: test-results
          destination: test-results
      - store_test_results:
          path: test-results

  merge-and-upload:
    docker:
      - image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_directory: ~/project
    environment:
      CI: "true"
    steps:
      - checkout
      - attach_workspace:
          at: workspace
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Merge Playwright reports to JSON
          command: |
            mkdir -p playwright-report
            npx playwright merge-reports --reporter=json workspace/blob > playwright-report/report.json
      - run:
          name: Upload results to TestDino
          command: npx tdpw upload ./playwright-report --token="$TESTDINO_TOKEN"
      - store_artifacts:
          path: playwright-report
          destination: playwright-report

workflows:
  test:
    jobs:
      - test
      - merge-and-upload:
          requires:
            - test
